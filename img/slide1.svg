    <circle cx="22" cy="162" r="3" fill="#ef4444"/>
    <circle cx="32" cy="228" r="2.4" fill="#f97316"/>
    <circle cx="448" cy="150" r="3.2" fill="#ef4444"/>
    <circle cx="450" cy="232" r="2.4" fill="#fbbf24"/>
    <circle cx="235" cy="14" r="2.8" fill="#ef4444"/>
    <circle cx="238" cy="365" r="2.4" fill="#f97316"/>
    <circle cx="100" cy="56" r="2.4" fill="#fbbf24"/>
    <circle cx="372" cy="58" r="2.8" fill="#ef4444"/>
    <circle cx="96" cy="320" r="2.4" fill="#ef4444"/>
    <circle cx="368" cy="322" r="2.8" fill="#f97316"/>
    <circle cx="60" cy="100" r="1.8" fill="#fbbf24"/>
    <circle cx="415" cy="102" r="2.2" fill="#ef4444"/>
    <circle cx="58" cy="275" r="1.8" fill="#ef4444"/>
    <circle cx="412" cy="270" r="2.2" fill="#fbbf24"/>
  </g>

  <!-- Debris — very outer (faint dots) -->
  <g opacity="0.55">
    <circle cx="8" cy="188" r="1.8" fill="#f97316"/>
    <circle cx="465" cy="188" r="1.8" fill="#ef4444"/>
    <circle cx="115" cy="38" r="1.6" fill="#ef4444"/>
    <circle cx="358" cy="38" r="1.6" fill="#f97316"/>
    <circle cx="113" cy="340" r="1.6" fill="#fbbf24"/>
