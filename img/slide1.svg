  <circle cx="30" cy="290" r="0.8" fill="white" opacity="0.45"/>
  <circle cx="170" cy="320" r="0.7" fill="white" opacity="0.4"/>
  <circle cx="580" cy="355" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="640" cy="80" r="0.7" fill="white" opacity="0.4"/>
  <circle cx="720" cy="120" r="0.8" fill="white" opacity="0.45"/>
  <circle cx="760" cy="200" r="0.6" fill="white" opacity="0.35"/>
  <circle cx="800" cy="310" r="0.7" fill="white" opacity="0.4"/>

  <!-- Atmosphere glow (outer ring) -->
