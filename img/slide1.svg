  <g filter="url(#s1-glow)">
    <circle cx="74" cy="172" r="4.5" fill="#ef4444"/>
    <circle cx="80" cy="212" r="3.2" fill="#f97316" opacity="0.92"/>
    <circle cx="397" cy="168" r="4.8" fill="#ef4444"/>
    <circle cx="392" cy="210" r="3.5" fill="#f97316" opacity="0.88"/>
    <circle cx="235" cy="64" r="3.8" fill="#ef4444" opacity="0.95"/>
    <circle cx="232" cy="318" r="3.2" fill="#f97316" opacity="0.88"/>
    <circle cx="143" cy="98" r="3.8" fill="#fbbf24" opacity="0.9"/>
    <circle cx="328" cy="96" r="3.2" fill="#ef4444" opacity="0.88"/>
