  <circle cx="490" cy="18" r="1.3" fill="white" opacity="0.85"/>
  <circle cx="620" cy="35" r="1" fill="white" opacity="0.6"/>
  <circle cx="710" cy="15" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="770" cy="60" r="1" fill="white" opacity="0.7"/>
  <circle cx="750" cy="280" r="1.4" fill="white" opacity="0.8"/>
  <circle cx="795" cy="180" r="1.2" fill="white" opacity="0.65"/>
  <circle cx="680" cy="340" r="1" fill="white" opacity="0.7"/>
  <circle cx="555" cy="360" r="1.3" fill="white" opacity="0.75"/>
  <!-- Stars layer 2 (dim) -->
