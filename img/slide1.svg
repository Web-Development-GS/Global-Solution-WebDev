  <circle cx="235" cy="188" r="128" fill="none" stroke="#3b82f6" stroke-width="5" opacity="0.12"/>

  <!-- Earth -->
  <circle cx="235" cy="188" r="118" fill="url(#s1-earth)" filter="url(#s1-earthglow)"/>

  <!-- Continents (simplified) -->
  <path d="M205 162 Q218 155 228 162 Q235 172 233 192 Q230 214 220 224 Q210 228 205 218 Q199 204 202 185 Q203 172 205 162Z" fill="#2d8a3e" opacity="0.78"/>
  <path d="M178 148 Q190 140 202 143 Q210 148 210 158 Q205 164 196 162 Q185 158 178 152Z" fill="#2d8a3e" opacity="0.7"/>
  <path d="M250 155 Q262 150 270 158 Q276 168 273 182 Q270 196 262 203 Q254 206 250 197 Q246 186 247 172 Q248 162 250 155Z" fill="#2d8a3e" opacity="0.68"/>
  <path d="M248 142 Q258 138 265 145 Q262 154 254 156 Q247 153 248 142Z" fill="#2d8a3e" opacity="0.62"/>
  <path d="M155 200 Q162 195 170 200 Q175 210 170 220 Q163 225 157 218 Q152 208 155 200Z" fill="#2d8a3e" opacity="0.55"/>
