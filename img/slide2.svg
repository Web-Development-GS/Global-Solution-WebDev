<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <radialGradient id="s2-bg" cx="50%" cy="45%" r="80%">
      <stop offset="0%" stop-color="#0c1a38"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <radialGradient id="s2-earth" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="25%" stop-color="#1c6db5"/>
      <stop offset="60%" stop-color="#0a4880"/>
      <stop offset="100%" stop-color="#041830"/>
    </radialGradient>
    <radialGradient id="s2-atmo" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="88%" stop-color="rgba(59,130,246,0.22)"/>
      <stop offset="100%" stop-color="rgba(59,130,246,0)"/>
    </radialGradient>
    <linearGradient id="s2-panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2a44"/>
      <stop offset="100%" stop-color="#0d1a30"/>
    </linearGradient>
    <linearGradient id="s2-sat-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="s2-sat-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="s2-sat-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="s2-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="s2-softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="s2-shadow" cx="70%" cy="72%" r="55%">
      <stop offset="40%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,10,0.5)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" fill="url(#s2-bg)"/>

  <!-- Stars -->
  <circle cx="32" cy="25" r="1.3" fill="white" opacity="0.85"/>
  <circle cx="95" cy="55" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="180" cy="18" r="1.1" fill="white" opacity="0.75"/>
  <circle cx="310" cy="32" r="0.8" fill="white" opacity="0.55"/>
  <circle cx="455" cy="22" r="1.3" fill="white" opacity="0.8"/>
  <circle cx="590" cy="42" r="1" fill="white" opacity="0.65"/>
  <circle cx="680" cy="18" r="1.4" fill="white" opacity="0.9"/>
  <circle cx="760" cy="55" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="740" cy="330" r="1.2" fill="white" opacity="0.75"/>
  <circle cx="790" cy="280" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="50" cy="355" r="1" fill="white" opacity="0.6"/>
  <circle cx="120" cy="340" r="0.7" fill="white" opacity="0.45"/>
  <circle cx="250" cy="362" r="0.9" fill="white" opacity="0.55"/>
  <circle cx="500" cy="358" r="1" fill="white" opacity="0.6"/>
  <circle cx="640" cy="345" r="0.8" fill="white" opacity="0.5"/>

  <!-- Earth (bottom-left, partially cut) -->
  <circle cx="110" cy="310" r="140" fill="url(#s2-atmo)"/>
  <circle cx="110" cy="310" r="118" fill="url(#s2-earth)" filter="url(#s2-softglow)"/>
  <path d="M75 240 Q88 232 98 238 Q106 246 104 260 Q100 275 90 280 Q80 278 76 266 Q72 252 75 240Z" fill="#2d8a3e" opacity="0.72"/>
  <path d="M125 245 Q133 240 140 246 Q145 255 142 266 Q138 275 130 276 Q122 272 120 262 Q119 252 125 245Z" fill="#2d8a3e" opacity="0.65"/>
  <circle cx="110" cy="310" r="118" fill="url(#s2-shadow)"/>

  <!-- Orbital arcs connecting satellites to Earth -->
  <path d="M 110 192 Q 200 80 310 120" fill="none" stroke="#2563eb" stroke-width="1" stroke-dasharray="6 5" opacity="0.35"/>
  <path d="M 110 192 Q 350 50 520 100" fill="none" stroke="#22c55e" stroke-width="1" stroke-dasharray="6 5" opacity="0.3"/>
  <path d="M 110 192 Q 450 20 700 88" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="6 5" opacity="0.28"/>

  <!-- ── SATELLITE 1: CBERS-4A (blue) ── -->
  <g transform="translate(280,105)" filter="url(#s2-glow)">
    <!-- Solar panel left -->
    <rect x="-62" y="-6" width="48" height="12" rx="2" fill="url(#s2-sat-blue)" opacity="0.88"/>
    <line x1="-62" y1="-6" x2="-62" y2="6" stroke="#93c5fd" stroke-width="0.6" opacity="0.6"/>
    <line x1="-46" y1="-6" x2="-46" y2="6" stroke="#93c5fd" stroke-width="0.6" opacity="0.6"/>
    <line x1="-30" y1="-6" x2="-30" y2="6" stroke="#93c5fd" stroke-width="0.6" opacity="0.6"/>
    <!-- Solar panel right -->
    <rect x="14" y="-6" width="48" height="12" rx="2" fill="url(#s2-sat-blue)" opacity="0.88"/>
    <line x1="14" y1="-6" x2="14" y2="6" stroke="#93c5fd" stroke-width="0.6" opacity="0.6"/>
    <line x1="30" y1="-6" x2="30" y2="6" stroke="#93c5fd" stroke-width="0.6" opacity="0.6"/>
    <line x1="46" y1="-6" x2="46" y2="6" stroke="#93c5fd" stroke-width="0.6" opacity="0.6"/>
    <!-- Body -->
    <rect x="-14" y="-10" width="28" height="20" rx="3" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Camera lens -->
    <circle cx="0" cy="0" r="5" fill="#0f172a" stroke="#60a5fa" stroke-width="1"/>
    <circle cx="0" cy="0" r="2.5" fill="#1d4ed8" opacity="0.8"/>
    <!-- Antenna -->
    <line x1="0" y1="-10" x2="0" y2="-20" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="0" cy="-22" r="3" fill="none" stroke="#93c5fd" stroke-width="1.2"/>
  </g>
  <!-- Card: CBERS-4A -->
  <rect x="220" y="125" width="120" height="72" rx="6" fill="rgba(8,18,36,0.92)" stroke="#2563eb" stroke-width="1.2"/>
  <rect x="220" y="125" width="120" height="3" rx="2" fill="#2563eb"/>
  <text x="280" y="146" text-anchor="middle" font-family="'Space Grotesk',Inter,sans-serif" font-size="12" fill="#93c5fd" font-weight="800">CBERS-4A</text>
  <text x="280" y="161" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">628 km · Polar</text>
  <text x="280" y="176" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">INPE · US$ 250mi</text>
  <rect x="240" y="184" width="80" height="7" rx="3" fill="#1e293b"/>
  <rect x="240" y="184" width="58" height="7" rx="3" fill="#2563eb" opacity="0.7"/>

  <!-- ── SATELLITE 2: AMAZONIA-1 (green) ── -->
  <g transform="translate(480,88)" filter="url(#s2-glow)">
    <!-- Solar panel left -->
    <rect x="-64" y="-6" width="50" height="12" rx="2" fill="url(#s2-sat-green)" opacity="0.88"/>
    <line x1="-64" y1="-6" x2="-64" y2="6" stroke="#86efac" stroke-width="0.6" opacity="0.6"/>
    <line x1="-48" y1="-6" x2="-48" y2="6" stroke="#86efac" stroke-width="0.6" opacity="0.6"/>
    <line x1="-32" y1="-6" x2="-32" y2="6" stroke="#86efac" stroke-width="0.6" opacity="0.6"/>
    <!-- Solar panel right -->
    <rect x="14" y="-6" width="50" height="12" rx="2" fill="url(#s2-sat-green)" opacity="0.88"/>
    <line x1="14" y1="-6" x2="14" y2="6" stroke="#86efac" stroke-width="0.6" opacity="0.6"/>
    <line x1="30" y1="-6" x2="30" y2="6" stroke="#86efac" stroke-width="0.6" opacity="0.6"/>
    <line x1="46" y1="-6" x2="46" y2="6" stroke="#86efac" stroke-width="0.6" opacity="0.6"/>
    <!-- Body -->
    <rect x="-14" y="-12" width="28" height="24" rx="3" fill="#0f2d1a" stroke="#22c55e" stroke-width="1.5"/>
    <!-- Sensor array -->
    <rect x="-8" y="-6" width="16" height="10" rx="1" fill="#15803d" opacity="0.8"/>
    <rect x="-5" y="-4" width="4" height="6" rx="1" fill="#86efac" opacity="0.5"/>
    <rect x="1" y="-4" width="4" height="6" rx="1" fill="#86efac" opacity="0.5"/>
    <!-- Antenna -->
    <line x1="6" y1="-12" x2="12" y2="-22" stroke="#86efac" stroke-width="1.5"/>
    <circle cx="13" cy="-23" r="2.5" fill="none" stroke="#86efac" stroke-width="1.2"/>
  </g>
  <!-- Card: AMAZONIA-1 -->
  <rect x="418" y="108" width="124" height="72" rx="6" fill="rgba(8,18,36,0.92)" stroke="#22c55e" stroke-width="1.2"/>
  <rect x="418" y="108" width="124" height="3" rx="2" fill="#22c55e"/>
  <text x="480" y="129" text-anchor="middle" font-family="'Space Grotesk',Inter,sans-serif" font-size="12" fill="#86efac" font-weight="800">AMAZONIA-1</text>
  <text x="480" y="144" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">752 km · Helio-síncrona</text>
  <text x="480" y="159" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">AEB · 100% brasileiro</text>
  <rect x="438" y="167" width="84" height="7" rx="3" fill="#1e293b"/>
  <rect x="438" y="167" width="68" height="7" rx="3" fill="#22c55e" opacity="0.7"/>

  <!-- ── SATELLITE 3: SCD-2 (purple) ── -->
  <g transform="translate(690,72)" filter="url(#s2-glow)">
    <!-- Solar panel left -->
    <rect x="-58" y="-5" width="44" height="10" rx="2" fill="url(#s2-sat-purple)" opacity="0.88"/>
    <line x1="-58" y1="-5" x2="-58" y2="5" stroke="#c4b5fd" stroke-width="0.6" opacity="0.6"/>
    <line x1="-42" y1="-5" x2="-42" y2="5" stroke="#c4b5fd" stroke-width="0.6" opacity="0.6"/>
    <line x1="-26" y1="-5" x2="-26" y2="5" stroke="#c4b5fd" stroke-width="0.6" opacity="0.6"/>
    <!-- Solar panel right -->
    <rect x="14" y="-5" width="44" height="10" rx="2" fill="url(#s2-sat-purple)" opacity="0.88"/>
    <line x1="14" y1="-5" x2="14" y2="5" stroke="#c4b5fd" stroke-width="0.6" opacity="0.6"/>
    <line x1="30" y1="-5" x2="30" y2="5" stroke="#c4b5fd" stroke-width="0.6" opacity="0.6"/>
    <line x1="46" y1="-5" x2="46" y2="5" stroke="#c4b5fd" stroke-width="0.6" opacity="0.6"/>
    <!-- Body -->
    <rect x="-14" y="-10" width="28" height="20" rx="3" fill="#1a0f35" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="#2e1065" stroke="#c4b5fd" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="2" fill="#7c3aed"/>
    <!-- Antenna -->
    <line x1="-6" y1="-10" x2="-10" y2="-20" stroke="#c4b5fd" stroke-width="1.5"/>
    <circle cx="-11" cy="-21" r="2.5" fill="none" stroke="#c4b5fd" stroke-width="1.2"/>
  </g>
  <!-- Card: SCD-2 -->
  <rect x="634" y="90" width="112" height="72" rx="6" fill="rgba(8,18,36,0.92)" stroke="#a78bfa" stroke-width="1.2"/>
  <rect x="634" y="90" width="112" height="3" rx="2" fill="#a78bfa"/>
  <text x="690" y="111" text-anchor="middle" font-family="'Space Grotesk',Inter,sans-serif" font-size="12" fill="#c4b5fd" font-weight="800">SCD-2</text>
  <text x="690" y="126" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">750 km · Equatorial</text>
  <text x="690" y="141" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">INPE · desde 1998</text>
  <rect x="650" y="149" width="80" height="7" rx="3" fill="#1e293b"/>
  <rect x="650" y="149" width="52" height="7" rx="3" fill="#a78bfa" opacity="0.7"/>

  <!-- Bottom info bar -->
  <rect x="0" y="330" width="800" height="50" fill="rgba(5,12,28,0.9)"/>
  <line x1="0" y1="330" x2="800" y2="330" stroke="#1e293b" stroke-width="1"/>
  <text x="400" y="352" text-anchor="middle" font-family="'Space Grotesk',Inter,sans-serif" font-size="13" fill="#f1f5f9" font-weight="700">Satélites Brasileiros Protegidos pelo Orbitrace</text>
  <text x="400" y="369" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#475569">CBERS-4A · Amazonia-1 · SCD-2 — monitoramento contínuo de risco de colisão</text>
</svg>
