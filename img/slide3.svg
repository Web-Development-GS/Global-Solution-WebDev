<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380">
  <defs>
    <radialGradient id="s3-bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#0d1b38"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <linearGradient id="s3-header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="s3-panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f1f3d"/>
      <stop offset="100%" stop-color="#080e1e"/>
    </linearGradient>
    <filter id="s3-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="s3-text-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" fill="url(#s3-bg)"/>

  <!-- Background grid (subtle) -->
  <g opacity="0.04" stroke="#3b82f6" stroke-width="0.5">
    <line x1="0" y1="38" x2="800" y2="38"/>
    <line x1="0" y1="76" x2="800" y2="76"/>
    <line x1="0" y1="114" x2="800" y2="114"/>
    <line x1="0" y1="152" x2="800" y2="152"/>
    <line x1="0" y1="190" x2="800" y2="190"/>
    <line x1="0" y1="228" x2="800" y2="228"/>
    <line x1="0" y1="266" x2="800" y2="266"/>
    <line x1="0" y1="304" x2="800" y2="304"/>
    <line x1="0" y1="342" x2="800" y2="342"/>
    <line x1="100" y1="0" x2="100" y2="380"/>
    <line x1="200" y1="0" x2="200" y2="380"/>
    <line x1="300" y1="0" x2="300" y2="380"/>
    <line x1="400" y1="0" x2="400" y2="380"/>
    <line x1="500" y1="0" x2="500" y2="380"/>
    <line x1="600" y1="0" x2="600" y2="380"/>
    <line x1="700" y1="0" x2="700" y2="380"/>
  </g>

  <!-- Stars -->
  <circle cx="30" cy="20" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="780" cy="15" r="1" fill="white" opacity="0.6"/>
  <circle cx="750" cy="355" r="1.3" fill="white" opacity="0.65"/>
  <circle cx="55" cy="362" r="0.9" fill="white" opacity="0.5"/>

  <!-- ── MAIN DASHBOARD PANEL ── -->
  <rect x="40" y="22" width="720" height="336" rx="12" fill="url(#s3-panel)" stroke="#1e3a5f" stroke-width="1.5"/>

  <!-- Header bar -->
  <rect x="40" y="22" width="720" height="44" rx="12" fill="url(#s3-header)"/>
  <rect x="40" y="50" width="720" height="16" fill="#1d4ed8"/>
  <!-- Header dots -->
  <circle cx="64" cy="44" r="6" fill="#dc2626" opacity="0.9"/>
  <circle cx="84" cy="44" r="6" fill="#f59e0b" opacity="0.9"/>
  <circle cx="104" cy="44" r="6" fill="#22c55e" opacity="0.9"/>
  <!-- Header title -->
  <text x="400" y="50" text-anchor="middle" font-family="'Space Grotesk',Inter,sans-serif" font-size="13" fill="white" font-weight="700" letter-spacing="2">ORBITRACE — SISTEMA DE MONITORAMENTO ORBITAL</text>
  <!-- Live indicator -->
  <circle cx="714" cy="44" r="5" fill="#22c55e" filter="url(#s3-glow)"/>
  <text x="706" y="47" text-anchor="end" font-family="Inter,sans-serif" font-size="9" fill="#86efac">AO VIVO</text>

  <!-- ── LEFT PANEL: Status table ── -->
  <rect x="55" y="80" width="450" height="34" rx="4" fill="rgba(30,58,95,0.5)"/>
  <text x="75" y="102" font-family="Inter,sans-serif" font-size="10" fill="#64748b" font-weight="600" letter-spacing="1">SATÉLITE</text>
  <text x="205" y="102" font-family="Inter,sans-serif" font-size="10" fill="#64748b" font-weight="600" letter-spacing="1">ALTITUDE</text>
  <text x="290" y="102" font-family="Inter,sans-serif" font-size="10" fill="#64748b" font-weight="600" letter-spacing="1">DIST. MÍN.</text>
  <text x="380" y="102" font-family="Inter,sans-serif" font-size="10" fill="#64748b" font-weight="600" letter-spacing="1">RISCO</text>
  <text x="440" y="102" font-family="Inter,sans-serif" font-size="10" fill="#64748b" font-weight="600" letter-spacing="1">STATUS</text>

  <!-- Row 1: CBERS-4A — MÉDIO -->
  <rect x="55" y="118" width="450" height="38" rx="4" fill="rgba(30,41,59,0.6)"/>
  <rect x="55" y="118" width="3" height="38" rx="1.5" fill="#f59e0b"/>
  <text x="75" y="142" font-family="'Space Grotesk',Inter,sans-serif" font-size="12" fill="#93c5fd" font-weight="700">CBERS-4A</text>
  <text x="205" y="142" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8">628 km</text>
  <text x="290" y="142" font-family="Inter,sans-serif" font-size="11" fill="#f1f5f9" font-weight="600">2.4 km</text>
  <rect x="370" y="128" width="56" height="20" rx="4" fill="rgba(245,158,11,0.18)" stroke="#f59e0b" stroke-width="1"/>
  <text x="398" y="142" text-anchor="middle" font-family="Inter,sans-serif" font-size="9.5" fill="#fbbf24" font-weight="700">MÉDIO</text>
  <text x="448" y="142" font-family="Inter,sans-serif" font-size="10" fill="#64748b">Em órbita</text>

  <!-- Row 2: AMAZONIA-1 — CRÍTICO -->
  <rect x="55" y="160" width="450" height="38" rx="4" fill="rgba(30,41,59,0.6)"/>
  <rect x="55" y="160" width="3" height="38" rx="1.5" fill="#dc2626"/>
  <text x="75" y="184" font-family="'Space Grotesk',Inter,sans-serif" font-size="12" fill="#86efac" font-weight="700">AMAZONIA-1</text>
  <text x="205" y="184" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8">752 km</text>
  <text x="290" y="184" font-family="Inter,sans-serif" font-size="11" fill="#ef4444" font-weight="700">0.6 km</text>
  <rect x="370" y="170" width="56" height="20" rx="4" fill="rgba(220,38,38,0.2)" stroke="#dc2626" stroke-width="1"/>
  <text x="398" y="184" text-anchor="middle" font-family="Inter,sans-serif" font-size="9.5" fill="#fca5a5" font-weight="700">CRÍTICO</text>
  <!-- Pulsing alert indicator -->
  <circle cx="448" cy="179" r="5" fill="#dc2626" filter="url(#s3-glow)" opacity="0.9"/>
  <text x="458" y="183" font-family="Inter,sans-serif" font-size="10" fill="#ef4444">ALERTA</text>

  <!-- Row 3: SCD-2 — BAIXO -->
  <rect x="55" y="202" width="450" height="38" rx="4" fill="rgba(30,41,59,0.6)"/>
  <rect x="55" y="202" width="3" height="38" rx="1.5" fill="#22c55e"/>
  <text x="75" y="226" font-family="'Space Grotesk',Inter,sans-serif" font-size="12" fill="#c4b5fd" font-weight="700">SCD-2</text>
  <text x="205" y="226" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8">750 km</text>
  <text x="290" y="226" font-family="Inter,sans-serif" font-size="11" fill="#f1f5f9" font-weight="600">12.3 km</text>
  <rect x="370" y="212" width="56" height="20" rx="4" fill="rgba(34,197,94,0.18)" stroke="#22c55e" stroke-width="1"/>
  <text x="398" y="226" text-anchor="middle" font-family="Inter,sans-serif" font-size="9.5" fill="#86efac" font-weight="700">BAIXO</text>
  <text x="448" y="226" font-family="Inter,sans-serif" font-size="10" fill="#64748b">Nominal</text>

  <!-- Divider -->
  <line x1="55" y1="252" x2="505" y2="252" stroke="#1e293b" stroke-width="1"/>

  <!-- Algorithm & data source info -->
  <text x="75" y="272" font-family="Inter,sans-serif" font-size="10" fill="#475569">Algoritmo: SGP4 · Dados: Celestrak / Space-Track · Atualizado: 09/06/2026 01:00 UTC</text>

  <!-- Legend -->
  <rect x="55" y="285" width="450" height="32" rx="4" fill="rgba(15,28,55,0.7)"/>
  <rect x="72" y="297" width="10" height="10" rx="2" fill="#22c55e" opacity="0.9"/>
  <text x="88" y="306" font-family="Inter,sans-serif" font-size="9.5" fill="#64748b">Baixo &gt;10km</text>
  <rect x="162" y="297" width="10" height="10" rx="2" fill="#f59e0b" opacity="0.9"/>
  <text x="178" y="306" font-family="Inter,sans-serif" font-size="9.5" fill="#64748b">Médio 1-10km</text>
  <rect x="262" y="297" width="10" height="10" rx="2" fill="#ef4444" opacity="0.9"/>
  <text x="278" y="306" font-family="Inter,sans-serif" font-size="9.5" fill="#64748b">Alto 0.2-1km</text>
  <rect x="362" y="297" width="10" height="10" rx="2" fill="#dc2626" opacity="0.9"/>
  <text x="378" y="306" font-family="Inter,sans-serif" font-size="9.5" fill="#64748b">Crítico &lt;0.2km</text>

  <!-- ── RIGHT PANEL: Risk chart + Arduino ── -->
  <rect x="520" y="80" width="226" height="256" rx="8" fill="rgba(15,25,50,0.7)" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Right panel title -->
  <text x="633" y="100" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#64748b" font-weight="600" letter-spacing="1">RISCO ACUMULADO — 24H</text>

  <!-- Bar chart (risk over time) -->
  <g transform="translate(533, 220)">
    <!-- Y axis -->
    <line x1="20" y1="-110" x2="20" y2="0" stroke="#1e3a5f" stroke-width="1"/>
    <!-- Bars -->
    <rect x="26" y="-22" width="14" height="22" rx="2" fill="#22c55e" opacity="0.85"/>
    <rect x="46" y="-35" width="14" height="35" rx="2" fill="#22c55e" opacity="0.8"/>
    <rect x="66" y="-28" width="14" height="28" rx="2" fill="#22c55e" opacity="0.8"/>
    <rect x="86" y="-55" width="14" height="55" rx="2" fill="#f59e0b" opacity="0.85"/>
    <rect x="106" y="-68" width="14" height="68" rx="2" fill="#f59e0b" opacity="0.85"/>
    <rect x="126" y="-88" width="14" height="88" rx="2" fill="#ef4444" opacity="0.85"/>
    <rect x="146" y="-110" width="14" height="110" rx="2" fill="#dc2626" opacity="0.9"/>
    <rect x="166" y="-95" width="14" height="95" rx="2" fill="#dc2626" opacity="0.8"/>
    <!-- X axis -->
    <line x1="20" y1="0" x2="200" y2="0" stroke="#1e3a5f" stroke-width="1"/>
    <text x="110" y="14" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#334155">Últimas 8 janelas orbitais</text>
  </g>

  <!-- Arduino console badge -->
  <rect x="533" y="248" width="200" height="72" rx="6" fill="rgba(8,14,28,0.95)" stroke="#1e293b" stroke-width="1"/>
  <rect x="533" y="248" width="200" height="3" rx="2" fill="#2563eb"/>
  <text x="543" y="265" font-family="Inter,sans-serif" font-size="9" fill="#475569">Console Arduino · Alerta ativo:</text>
  <!-- Active alert badge -->
  <rect x="543" y="271" width="180" height="22" rx="4" fill="rgba(220,38,38,0.18)" stroke="#dc2626" stroke-width="1.2"/>
  <circle cx="555" cy="282" r="4" fill="#dc2626" filter="url(#s3-glow)"/>
  <text x="563" y="286" font-family="'Space Grotesk',Inter,sans-serif" font-size="11" fill="#fca5a5" font-weight="700">AMAZONIA-1 — CRÍTICO</text>
  <text x="543" y="308" font-family="Inter,sans-serif" font-size="8.5" fill="#334155">LED vermelho · Buzzer ativo · Display OLED</text>

  <!-- Bottom bar -->
  <rect x="40" y="338" width="720" height="20" rx="4" fill="rgba(10,20,40,0.7)"/>
  <text x="400" y="352" text-anchor="middle" font-family="Inter,sans-serif" font-size="9.5" fill="#334155">Orbitrace — Alternativa nacional ao STK (US$ 20.000+/ano) · Open Source · Em Português · Global Solution 2026 · FIAP</text>
</svg>
